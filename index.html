<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070c;
    --bg-2:#0d0d16;
    --ink:#f4f3ff;
    --ink-dim:#8b8ba3;
    --line:rgba(255,255,255,.08);
    --neon:#00e5ff;
    --neon-2:#7c4dff;
    --heat:#ff5a1f;
    --heat-2:#ffb020;
    --ok:#2dd4bf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Inter','Noto Sans JP',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
  html[lang="ja"] body{font-family:'Noto Sans JP','Inter',system-ui,sans-serif}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em}
  .container{max-width:1240px;margin:0 auto;padding:0 24px}
  .wrap{position:relative;z-index:1}

  /* Focus visible on dark background, keyboard navigation only */
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--neon);outline-offset:3px;border-radius:4px}
  .btn:focus-visible{outline-offset:4px}

  /* Skip link for screen reader / keyboard */
  .skip-link{
    position:absolute;left:-9999px;top:0;z-index:100;
    background:var(--neon);color:#05050f;padding:10px 16px;border-radius:0 0 8px 0;
    font-weight:700;font-size:14px;
  }
  .skip-link:focus{left:0}

  /* Hide visually, leave available to screen readers */
  .visually-hidden{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }

  .bg-grid{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px,transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(ellipse at 50% 20%,#000 30%,transparent 70%);
  }
  .bg-glow{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(900px 500px at 15% 0%, rgba(124,77,255,.18), transparent 60%),
      radial-gradient(800px 500px at 90% 10%, rgba(0,229,255,.15), transparent 60%),
      radial-gradient(700px 400px at 50% 90%, rgba(255,90,31,.12), transparent 60%);
  }

  nav.top{
    position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:rgba(7,7,12,.65);border-bottom:1px solid var(--line);
  }
  nav.top .bar{display:flex;align-items:center;justify-content:space-between;height:68px;gap:14px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.02em}
  .logo-mark{
    width:30px;height:30px;border-radius:8px;
    background:conic-gradient(from 180deg,var(--neon),var(--neon-2),var(--heat),var(--heat-2),var(--neon));
    box-shadow:0 0 24px rgba(0,229,255,.35), inset 0 0 10px rgba(0,0,0,.4);
    position:relative;
  }
  .logo-mark::after{content:"";position:absolute;inset:6px;background:#07070c;border-radius:4px}
  .logo-mark::before{content:"";position:absolute;inset:10px;border-radius:2px;background:var(--neon);box-shadow:0 0 8px var(--neon)}
  .nav-links{display:flex;gap:22px;align-items:center}
  .nav-links a{color:var(--ink-dim);font-size:14px;font-weight:500;transition:color .2s}
  .nav-links a:hover{color:var(--ink)}
  .nav-right{display:flex;align-items:center;gap:10px}

  .lang-select{
    appearance:none;-webkit-appearance:none;
    background:rgba(255,255,255,.04) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238b8ba3' fill='none' stroke-width='1.5'/></svg>") no-repeat right 10px center;
    border:1px solid var(--line);color:var(--ink);
    font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.05em;
    padding:7px 26px 7px 12px;border-radius:999px;cursor:pointer;
  }
  .lang-select:focus{outline:none;border-color:var(--neon)}
  .lang-select option{background:#0d0d16;color:var(--ink)}

  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 20px;border-radius:999px;font-weight:600;font-size:14px;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    white-space:nowrap;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--neon),var(--neon-2));
    color:#050510;box-shadow:0 8px 30px rgba(0,229,255,.28), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 40px rgba(0,229,255,.45)}
  .btn-ghost{border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.04)}
  .btn-heat{
    background:linear-gradient(135deg,var(--heat),var(--heat-2));
    color:#1a0800;box-shadow:0 8px 30px rgba(255,90,31,.35), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn-heat:hover{transform:translateY(-1px);box-shadow:0 10px 40px rgba(255,90,31,.55)}

  .hero{padding:80px 0 60px;position:relative}
  .chip{
    display:inline-flex;align-items:center;gap:8px;
    padding:6px 12px;border:1px solid var(--line);border-radius:999px;
    font-size:12px;color:var(--ink-dim);background:rgba(255,255,255,.02);
  }
  .chip .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok)}
  h1.display{
    font-size:clamp(40px,6.2vw,84px);line-height:.98;letter-spacing:-.03em;font-weight:800;
    margin:20px 0 24px;
  }
  html[lang="ja"] h1.display{letter-spacing:0;line-height:1.1}
  h1 .grad{
    background:linear-gradient(90deg,var(--neon) 0%,var(--neon-2) 50%,var(--heat) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{font-size:clamp(16px,1.4vw,20px);color:var(--ink-dim);max-width:620px;line-height:1.55}
  .hero-row{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center}
  .hero-cta{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap}
  .hero-meta{display:flex;gap:28px;margin-top:32px;color:var(--ink-dim);font-size:13px;flex-wrap:wrap}
  .hero-meta b{color:var(--ink);font-weight:700;font-size:22px;display:block}

  .machine{position:relative;aspect-ratio:1/1.05;width:100%;max-width:520px;margin-left:auto}
  .machine svg{width:100%;height:100%;display:block}
  .machine::before{
    content:"";position:absolute;inset:-40px;z-index:-1;
    background:radial-gradient(60% 60% at 50% 50%, rgba(255,90,31,.25), transparent 70%);
    filter:blur(20px);
  }
  .pulse{animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.65}50%{opacity:1}}
  .spin-slow{transform-origin:center;animation:spin 18s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  section{padding:80px 0;position:relative}
  .eyebrow{color:var(--neon);font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
  h2.section-title{font-size:clamp(28px,3.6vw,48px);line-height:1.05;letter-spacing:-.02em;font-weight:800;margin:10px 0 20px;max-width:820px}
  html[lang="ja"] h2.section-title{letter-spacing:0;line-height:1.2}
  .section-lead{color:var(--ink-dim);font-size:17px;max-width:700px;line-height:1.6}

  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:48px}
  .step{
    border:1px solid var(--line);border-radius:18px;padding:24px;
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    position:relative;overflow:hidden;transition:border-color .2s, transform .2s;
  }
  .step:hover{border-color:rgba(0,229,255,.3);transform:translateY(-3px)}
  .step .num{font-family:'JetBrains Mono',monospace;color:var(--neon);font-size:12px;letter-spacing:.1em}
  .step h3{font-size:20px;margin:12px 0 8px;letter-spacing:-.01em}
  .step p{color:var(--ink-dim);font-size:14px;line-height:1.55}
  .step .icon{
    width:44px;height:44px;border-radius:12px;background:rgba(0,229,255,.08);
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,229,255,.2);
    margin-bottom:16px;
  }
  .step .icon svg{width:22px;height:22px;stroke:var(--neon);fill:none;stroke-width:1.6}

  .features{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
  .feat{
    border:1px solid var(--line);border-radius:20px;padding:28px;
    background:rgba(13,13,22,.6);transition:all .2s;
  }
  .feat:hover{border-color:rgba(124,77,255,.35);background:rgba(124,77,255,.04)}
  .feat h3{font-size:18px;margin:14px 0 8px;letter-spacing:-.01em}
  .feat p{color:var(--ink-dim);font-size:14px;line-height:1.6}
  .feat .dotico{
    width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg, rgba(0,229,255,.14), rgba(124,77,255,.14));
    border:1px solid var(--line);
  }
  .feat .dotico svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:1.6}

  .app-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-top:40px}
  .phone{
    width:280px;height:560px;margin:0 auto;
    border-radius:44px;border:2px solid rgba(255,255,255,.15);
    background:linear-gradient(180deg,#0d0d16,#07070c);
    box-shadow:0 40px 80px rgba(0,0,0,.5), inset 0 0 0 6px #000;
    position:relative;overflow:hidden;
  }
  .phone::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:100px;height:24px;background:#000;border-radius:0 0 16px 16px;z-index:2}
  .phone-screen{position:absolute;inset:14px;border-radius:34px;background:#07070c;overflow:hidden;display:flex;flex-direction:column;padding:32px 18px 18px}
  .phone-h{font-size:11px;color:var(--ink-dim);letter-spacing:.15em;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
  .phone-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
  .phone-card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.02);font-size:12px}
  .phone-card .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .phone-card .row:last-child{margin-bottom:0}
  .phone-card .big{font-weight:700;font-size:14px;color:#fff}
  .phone-card .sm{color:var(--ink-dim)}
  .slot{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .slot span{font-size:10px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-dim)}
  .slot span.sel{background:var(--neon);color:#000;border-color:var(--neon)}
  .phone-cta{margin-top:auto;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--neon),var(--neon-2));color:#05050f;font-weight:700;text-align:center;font-size:13px}

  /* Wishes section */
  #wishes{
    background:
      radial-gradient(800px 300px at 80% 0%, rgba(255,90,31,.12), transparent 60%),
      radial-gradient(600px 300px at 20% 100%, rgba(255,176,32,.08), transparent 60%);
  }
  .wish-form{
    display:flex;gap:8px;margin-top:36px;max-width:680px;flex-wrap:wrap;
  }
  .wish-form input{
    flex:1;min-width:240px;padding:16px 20px;border-radius:999px;
    background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--ink);
    font-size:15px;font-family:inherit;
  }
  .wish-form input:focus{outline:none;border-color:var(--heat);box-shadow:0 0 0 4px rgba(255,90,31,.14)}
  .wish-counter{margin-top:20px;color:var(--ink-dim);font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
  .wish-counter b{color:var(--heat);font-size:18px;font-weight:700;margin-right:6px}
  .wish-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:44px;
    position:relative;
  }
  .wish-card{
    border:1px solid var(--line);border-radius:16px;padding:18px 20px;
    background:linear-gradient(180deg, rgba(255,90,31,.04), rgba(255,255,255,.01));
    font-size:14px;line-height:1.45;color:var(--ink);
    position:relative;transition:transform .2s, border-color .2s;
    min-height:72px;display:flex;align-items:flex-start;gap:10px;
  }
  .wish-card:hover{border-color:rgba(255,90,31,.35);transform:translateY(-2px)}
  .wish-card::before{
    content:"🔥";font-size:14px;flex-shrink:0;margin-top:1px;
    filter:drop-shadow(0 0 6px rgba(255,90,31,.6));
  }
  .wish-card.mine{border-color:rgba(255,90,31,.45);background:linear-gradient(180deg, rgba(255,90,31,.1), rgba(255,176,32,.04))}
  .wish-card.mine::before{content:"⭐"}
  .wish-card.new{animation:wishIn .7s cubic-bezier(.2,.8,.2,1)}
  @keyframes wishIn{
    0%{opacity:0;transform:translateY(12px) scale(.96);box-shadow:0 0 40px rgba(255,90,31,.8)}
    100%{opacity:1;transform:translateY(0) scale(1);box-shadow:0 0 0 rgba(255,90,31,0)}
  }
  .wish-confirm{
    margin-top:14px;color:var(--heat-2);font-size:14px;font-weight:600;
    opacity:0;transform:translateY(-6px);transition:opacity .3s, transform .3s;
  }
  .wish-confirm.show{opacity:1;transform:translateY(0)}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:48px}
  .stat{border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center}
  .stat .v{font-size:clamp(28px,3vw,40px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--neon),var(--heat));-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat .l{color:var(--ink-dim);font-size:13px;margin-top:4px}

  .faq{max-width:820px;margin:40px auto 0}
  .q{border-top:1px solid var(--line);padding:22px 0}
  .q:last-child{border-bottom:1px solid var(--line)}
  .q summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;font-weight:600;font-size:17px;letter-spacing:-.01em}
  .q summary::-webkit-details-marker{display:none}
  .q summary::after{content:"+";color:var(--neon);font-size:24px;font-weight:300;transition:transform .2s}
  .q[open] summary::after{transform:rotate(45deg)}
  .q p{color:var(--ink-dim);margin-top:12px;line-height:1.6;font-size:15px}

  .waitlist-wrap{
    border:1px solid var(--line);border-radius:28px;padding:56px 40px;margin-top:60px;
    background:
      radial-gradient(800px 300px at 20% 0%, rgba(0,229,255,.1), transparent 60%),
      radial-gradient(600px 300px at 80% 100%, rgba(255,90,31,.12), transparent 60%),
      linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
    text-align:center;position:relative;overflow:hidden;
  }
  .waitlist-wrap h2{font-size:clamp(32px,4vw,52px);letter-spacing:-.02em;line-height:1;margin-bottom:16px}
  html[lang="ja"] .waitlist-wrap h2{letter-spacing:0;line-height:1.2}
  .waitlist-wrap p{color:var(--ink-dim);font-size:17px;max-width:560px;margin:0 auto 28px}
  form.wl{display:flex;gap:8px;max-width:480px;margin:0 auto;flex-wrap:wrap}
  form.wl input{
    flex:1;min-width:200px;padding:14px 18px;border-radius:999px;
    background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--ink);
    font-size:14px;font-family:inherit;
  }
  form.wl input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 4px rgba(0,229,255,.12)}
  .wl-meta{color:var(--ink-dim);font-size:12px;margin-top:14px}

  .ticker{
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:18px 0;overflow:hidden;white-space:nowrap;
    font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--ink-dim);
  }
  html[lang="ja"] .ticker{font-family:'Noto Sans JP','JetBrains Mono',monospace;font-weight:500}
  .ticker-track{display:inline-flex;gap:40px;animation:tick 40s linear infinite}
  .ticker span b{color:var(--neon)}
  @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  footer{padding:50px 0 40px;border-top:1px solid var(--line);color:var(--ink-dim);font-size:13px;margin-top:60px}
  footer .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px}
  footer a:hover{color:var(--ink)}

  /* ================= Partner / ROI-OEE Simulator ================= */
  #partner{
    background:
      radial-gradient(900px 400px at 10% 0%, rgba(0,229,255,.1), transparent 60%),
      radial-gradient(700px 400px at 95% 100%, rgba(124,77,255,.12), transparent 60%);
  }
  .model-tabs{
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:40px;
  }
  .model-tab{
    display:flex;flex-direction:column;align-items:flex-start;gap:6px;
    text-align:left;padding:20px 22px;border-radius:18px;
    border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    transition:border-color .2s, transform .2s, background .2s;
  }
  .model-tab:hover{border-color:rgba(0,229,255,.3);transform:translateY(-2px)}
  .model-tab.active{
    border-color:rgba(0,229,255,.55);
    background:linear-gradient(180deg, rgba(0,229,255,.07), rgba(124,77,255,.05));
    box-shadow:inset 0 0 0 1px rgba(0,229,255,.15), 0 10px 40px rgba(0,229,255,.08);
  }
  .model-tab-num{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--neon);
    letter-spacing:.15em;
  }
  .model-tab-title{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .model-tab-ticket{font-size:12px;color:var(--ink-dim);font-family:'JetBrains Mono',monospace}

  .sim-wrap{
    display:grid;grid-template-columns:1fr 1.1fr;gap:28px;margin-top:28px;
    border:1px solid var(--line);border-radius:22px;padding:28px;
    background:linear-gradient(180deg, rgba(13,13,22,.7), rgba(13,13,22,.4));
  }
  .sim-panel-title{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--ink-dim);margin-bottom:16px;
  }
  .slider-group{margin-bottom:18px}
  .slider-group label{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:13px;color:var(--ink-dim);margin-bottom:6px;
  }
  .slider-group label .slider-val{
    font-family:'JetBrains Mono',monospace;color:var(--ink);font-size:14px;font-weight:600;
  }
  .sim-range{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:999px;
    background:rgba(255,255,255,.1);outline:none;
  }
  .sim-range::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:linear-gradient(135deg,var(--neon),var(--neon-2));
    cursor:pointer;box-shadow:0 2px 10px rgba(0,229,255,.5);
    transition:transform .1s;
  }
  .sim-range::-webkit-slider-thumb:hover{transform:scale(1.2)}
  .sim-range::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;border:none;
    background:linear-gradient(135deg,var(--neon),var(--neon-2));
    cursor:pointer;box-shadow:0 2px 10px rgba(0,229,255,.5);
  }
  .oee-result{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;margin:8px 0 22px;border-radius:12px;
    background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);
  }
  .oee-result .lbl{font-size:12px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase}
  .oee-result .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--neon)}

  .sim-results{
    display:flex;flex-direction:column;gap:14px;
  }
  .big-result{
    padding:22px 24px;border-radius:16px;
    background:linear-gradient(135deg, rgba(255,90,31,.12), rgba(255,176,32,.06));
    border:1px solid rgba(255,90,31,.25);
  }
  .big-result-num{
    font-size:clamp(32px,4vw,44px);font-weight:800;letter-spacing:-.02em;
    background:linear-gradient(135deg,var(--heat-2),var(--heat));
    -webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;
  }
  .big-result-lbl{font-size:13px;color:var(--ink-dim);margin-top:6px}
  .sub-results{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .sub-result{
    padding:16px 14px;border-radius:12px;
    border:1px solid var(--line);background:rgba(255,255,255,.02);
  }
  .sub-result-num{font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
  .sub-result-lbl{font-size:11px;color:var(--ink-dim);margin-top:4px;letter-spacing:.04em}
  .sim-hook{
    padding:14px 16px;border-radius:12px;
    background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.25);
    font-size:14px;color:var(--ok);font-weight:500;line-height:1.45;
  }
  .sim-hook::before{content:"✦ ";font-weight:800}

  details.sim-details{
    border:1px solid var(--line);border-radius:12px;padding:0;
    background:rgba(0,0,0,.15);margin-top:4px;
  }
  details.sim-details>summary{
    list-style:none;cursor:pointer;padding:14px 18px;font-size:13px;font-weight:600;
    color:var(--neon);display:flex;justify-content:space-between;align-items:center;
  }
  details.sim-details>summary::-webkit-details-marker{display:none}
  details.sim-details>summary::after{content:"+";font-size:18px;transition:transform .2s}
  details.sim-details[open]>summary::after{transform:rotate(45deg)}
  .pl-box{padding:0 18px 18px;font-size:12px}
  .pl-table{width:100%;border-collapse:collapse;margin-top:4px}
  .pl-table th,.pl-table td{
    padding:8px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.05);
    font-family:'JetBrains Mono',monospace;font-size:12px;
  }
  .pl-table th:first-child,.pl-table td:first-child{text-align:left;color:var(--ink-dim);font-family:inherit}
  .pl-table thead th{color:var(--ink-dim);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .pl-table tr.total td{font-weight:700;color:var(--ink);border-top:1px solid rgba(255,255,255,.15)}
  .sensitivity{margin-top:14px;padding-top:14px;border-top:1px dashed rgba(255,255,255,.08)}
  .sensitivity-title{font-size:11px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .sens-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .sens-row{
    display:flex;justify-content:space-between;padding:8px 10px;border-radius:8px;
    background:rgba(255,255,255,.02);font-size:12px;
  }
  .sens-row b{font-family:'JetBrains Mono',monospace;color:var(--heat-2);font-weight:700}

  .partner-cta{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
  .partner-disclaimer{
    max-width:760px;font-size:12px;color:var(--ink-dim);line-height:1.55;
    font-family:'JetBrains Mono',monospace;letter-spacing:.01em;
  }

  @media (max-width:880px){
    .hero-row{grid-template-columns:1fr}
    .machine{max-width:380px;margin:20px auto 0}
    .steps{grid-template-columns:repeat(2,1fr)}
    .features{grid-template-columns:1fr}
    .app-wrap{grid-template-columns:1fr;gap:40px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .wish-grid{grid-template-columns:1fr}
    .nav-links{display:none}
    .model-tabs{grid-template-columns:1fr}
    .sim-wrap{grid-template-columns:1fr;padding:22px}
    .sub-results{grid-template-columns:1fr}
    .sens-grid{grid-template-columns:1fr}
  }

  /* Respect system-level reduced motion preference */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{
      animation-duration:.001ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.001ms !important;
      scroll-behavior:auto !important;
    }
    .ticker-track{animation:none !important;transform:none !important}
    .spin-slow{animation:none !important}
    .pulse{animation:none !important;opacity:.85}
  }
</style>
</head>
